steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/waypoints-repo/api:$BUILD_ID', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/waypoints-repo/api:latest', '.']

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'us-central1-docker.pkg.dev/$PROJECT_ID/waypoints-repo/api']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'pt-waypoints-api'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/waypoints-repo/api:$BUILD_ID'
      - '--region'
      - 'us-central1'
      - '--timeout'
      - '300'
      - '--port'
      - '8080'
      - '--allow-unauthenticated'
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/waypoints-repo/api:$BUILD_ID'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/waypoints-repo/api:latest'
options:
  logging: CLOUD_LOGGING_ONLY