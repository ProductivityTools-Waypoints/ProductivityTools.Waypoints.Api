spring.application.name=api
spring.graphql.graphiql.enabled=true
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=native

# GraphQL CORS
spring.graphql.cors.allowed-origins=*
spring.graphql.cors.allowed-methods=GET,POST,OPTIONS
spring.graphql.cors.allowed-headers=*

# Firestore
spring.cloud.gcp.firestore.database-id=waypoints

#spring.cloud.gcp.credentials.location=file:/usr/local/google/home/pwujczyk/github/Home.Configuration/PTProjectsWeb.Firebase.ServiceAccount.json
spring.cloud.gcp.project-id=ptprojectsweb

# Firebase Auth Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://securetoken.google.com/ptprojectsweb
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://www.googleapis.com/service_accounts/v1/jwk/securetoken@system.gserviceaccount.com
